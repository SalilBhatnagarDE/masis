[pytest]
# MASIS Test Configuration -- Phase 0 Foundation + Phase 1+ Infrastructure
testpaths =
    masis/tests
    masis/infra/tests
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    asyncio: async test requiring event loop
    slow: tests that take > 5 seconds (deselect with -m "not slow")
    integration: tests requiring external services (deselect with -m "not integration")
    unit: fast, self-contained unit tests
