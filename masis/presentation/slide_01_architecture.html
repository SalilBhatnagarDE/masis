<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>MASIS – High-Level Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #080d1a;
    --surface:    #0f1629;
    --border:     #1e2d50;
    --accent1:    #4f8ef7;   /* blue  – Supervisor */
    --accent2:    #7c5cfc;   /* violet – Executor  */
    --accent3:    #f7934f;   /* orange – Validator */
    --accent4:    #3ecf8e;   /* green  – Agents    */
    --accent5:    #f75f6d;   /* red    – loops     */
    --text:       #e8eeff;
    --text-muted: #8899cc;
    --gold:       #f5c542;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    width: 1280px;
    height: 720px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .slide-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 36px 10px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0a1128, #0f1a35);
    flex-shrink: 0;
  }
  .slide-header h1 {
    font-size: 20px; font-weight: 800; letter-spacing: .5px;
    background: linear-gradient(90deg, #7eb8ff, #b9a9ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .slide-header .sub {
    font-size: 11px; color: var(--text-muted); font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
  }
  .badge {
    font-size: 10px; font-weight: 600; color: var(--gold);
    border: 1px solid var(--gold); border-radius: 20px;
    padding: 3px 10px; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── MAIN CANVAS ── */
  .canvas {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg#diagram {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── LEGEND ── */
  .legend {
    position: absolute;
    bottom: 10px;
    left: 30px;
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted); }
  .leg-dot  { width: 10px; height: 10px; border-radius: 50%; }

</style>
</head>
